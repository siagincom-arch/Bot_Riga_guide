services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: python -m src.bot

  ingest:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./docs:/app/docs:ro
      - ./tests:/app/tests:ro
    profiles:
      - manual
    command: python -m ingest
